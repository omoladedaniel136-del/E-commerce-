<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LUXE — Premium Fashion Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>

/* =============================================
   VARIABLES & RESET
   ============================================= */
:root {
  --cream:    #faf7f2;
  --warm:     #f5efe6;
  --beige:    #e8ddd0;
  --brown:    #8b6f5e;
  --dark:     #1a1410;
  --charcoal: #2d2520;
  --gold:     #c9a84c;
  --gold2:    #e8c96d;
  --rust:     #c4622d;
  --sage:     #7a8c6e;
  --text:     #3d3530;
  --muted:    #9e8e85;
  --white:    #ffffff;
  --radius:   4px;
  --trans:    0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow-x: hidden;
}

img { display: block; max-width: 100%; }
a  { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { cursor: pointer; font-family: inherit; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--warm); }
::-webkit-scrollbar-thumb { background: var(--gold); }

/* =============================================
   TYPOGRAPHY
   ============================================= */
.serif { font-family: 'Cormorant Garamond', serif; }
.display { font-family: 'Playfair Display', serif; }

/* =============================================
   KEYFRAMES
   ============================================= */
@keyframes fadeUp   { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes slideLeft{ from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes shimmer  { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes marquee  { from{transform:translateX(0)} to{transform:translateX(-50%)} }
@keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes drawLine { from{width:0} to{width:100%} }

/* =============================================
   REVEAL
   ============================================= */
.reveal {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
.reveal-delay-5 { transition-delay: 0.5s; }

/* =============================================
   LAYOUT
   ============================================= */
.container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
@media(max-width:768px){ .container{ padding:0 20px; } }
.section-pad { padding: 100px 0; }

/* =============================================
   ANNOUNCEMENT BAR
   ============================================= */
.announcement {
  background: var(--dark);
  color: var(--cream);
  text-align: center;
  padding: 10px 20px;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 500;
  overflow: hidden;
  position: relative;
}
.announcement span { color: var(--gold2); }

/* =============================================
   NAVBAR
   ============================================= */
nav {
  background: var(--cream);
  border-bottom: 1px solid var(--beige);
  position: sticky; top: 0; z-index: 100;
  padding: 0 40px;
  height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  transition: box-shadow 0.3s;
}
nav.scrolled { box-shadow: 0 4px 32px rgba(26,20,16,0.08); }

.nav-logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: var(--dark);
}
.nav-logo-text span { color: var(--gold); }

.nav-links-center {
  display: flex; gap: 36px;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-links-center a {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text);
  transition: color 0.3s;
  position: relative;
}
.nav-links-center a::after {
  content: ''; position: absolute; left: 0; bottom: -4px;
  height: 1px; width: 0;
  background: var(--gold);
  transition: width 0.3s;
}
.nav-links-center a:hover { color: var(--dark); }
.nav-links-center a:hover::after { width: 100%; }

.nav-actions { display: flex; align-items: center; gap: 20px; }
.nav-icon-btn {
  background: none; border: none;
  font-size: 18px; color: var(--text);
  transition: color 0.3s;
  position: relative;
}
.nav-icon-btn:hover { color: var(--gold); }
.cart-badge {
  position: absolute; top: -6px; right: -6px;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--rust); color: #fff;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn {
  padding: 9px 22px;
  background: var(--dark);
  color: var(--cream);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--dark);
  transition: var(--trans);
}
.nav-btn:hover { background: transparent; color: var(--dark); }

.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none;
}
.hamburger span { display: block; width: 22px; height: 1.5px; background: var(--dark); transition: var(--trans); }

@media(max-width:900px){
  .nav-links-center { display: none; }
  .hamburger { display: flex; }
  nav { padding: 0 20px; }
}

/* Mobile menu */
.mobile-menu {
  display: none;
  position: fixed; inset: 72px 0 0 0;
  background: var(--cream);
  z-index: 99;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-size: 22px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--dark);
}

/* =============================================
   HERO
   ============================================= */
.hero {
  min-height: calc(100vh - 108px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}

.hero-left {
  background: var(--dark);
  padding: 80px 60px 80px 80px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative;
  overflow: hidden;
}
/* Subtle texture */
.hero-left::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 20% 80%, rgba(201,168,76,0.12) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(196,98,45,0.08) 0%, transparent 50%);
}

.hero-eyebrow {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.7s 0.3s forwards;
}
.hero-eyebrow::before {
  content: ''; width: 40px; height: 1px; background: var(--gold);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 6vw, 88px);
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.02em;
  color: var(--cream);
  margin-bottom: 8px;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.8s 0.5s forwards;
}
.hero-title em {
  font-style: italic;
  color: var(--gold);
}

.hero-title-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(40px, 5vw, 72px);
  font-weight: 300;
  font-style: italic;
  color: rgba(250,247,242,0.4);
  line-height: 1;
  margin-bottom: 36px;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.8s 0.65s forwards;
}

.hero-desc {
  font-size: 15px;
  color: rgba(250,247,242,0.6);
  line-height: 1.75;
  max-width: 380px;
  margin-bottom: 44px;
  font-weight: 300;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.7s 0.8s forwards;
}

.hero-actions {
  display: flex; gap: 16px; flex-wrap: wrap;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.7s 0.95s forwards;
}
.btn-primary {
  padding: 16px 36px;
  background: var(--gold);
  color: var(--dark);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--gold);
  transition: var(--trans);
  display: inline-flex; align-items: center; gap: 10px;
}
.btn-primary:hover {
  background: transparent;
  color: var(--gold);
  transform: translateY(-2px);
}
.btn-outline-light {
  padding: 16px 36px;
  background: transparent;
  color: var(--cream);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid rgba(250,247,242,0.3);
  transition: var(--trans);
}
.btn-outline-light:hover {
  border-color: var(--cream);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex; gap: 40px; margin-top: 56px;
  padding-top: 40px;
  border-top: 1px solid rgba(250,247,242,0.1);
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeUp 0.7s 1.1s forwards;
}
.hero-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}
.hero-stat-label {
  font-size: 11px;
  color: rgba(250,247,242,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

/* Hero Right — product showcase */
.hero-right {
  background: var(--warm);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.hero-right-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #f5efe6 0%, #ede3d8 100%);
}
/* Big decorative circle */
.hero-circle {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(139,111,94,0.15);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.hero-circle-2 {
  width: 340px; height: 340px;
  border: 1px solid rgba(201,168,76,0.2);
}

/* Product image mockup */
.hero-product {
  position: relative; z-index: 2;
  text-align: center;
  opacity: 0;
  animation: fadeIn 1s 0.8s forwards;
}
.hero-product-img {
  width: 320px; height: 420px;
  background: linear-gradient(160deg, #d4c5b8 0%, #c4b09f 100%);
  border-radius: 200px 200px 160px 160px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(26,20,16,0.2), 0 0 0 1px rgba(201,168,76,0.2);
  animation: float 5s ease-in-out infinite;
}
.hero-product-img i {
  font-size: 80px;
  color: rgba(139,111,94,0.3);
}
.hero-product-img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, rgba(26,20,16,0.25) 100%);
}

/* Floating product badges */
.product-badge {
  position: absolute;
  background: var(--white);
  border-radius: 12px;
  padding: 12px 16px;
  box-shadow: 0 8px 32px rgba(26,20,16,0.12);
  z-index: 3;
  opacity: 0;
  animation: slideLeft 0.7s forwards;
}
.product-badge-1 {
  top: 15%; left: -40px;
  animation-delay: 1.2s;
}
.product-badge-2 {
  bottom: 20%; right: -40px;
  animation-delay: 1.4s;
}
.badge-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.badge-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--dark);
}
.badge-sub { font-size: 11px; color: var(--muted); }

/* Sale tag */
.hero-sale-tag {
  position: absolute;
  top: 20px; right: 20px;
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--rust);
  color: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 4;
  animation: pulse 2.5s infinite, fadeIn 0.5s 1.6s forwards;
  opacity: 0;
}
.sale-pct {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 900;
  line-height: 1;
}
.sale-off { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }

@media(max-width:900px){
  .hero { grid-template-columns: 1fr; }
  .hero-left { padding: 60px 24px; }
  .hero-right { min-height: 360px; }
  .hero-product-img { width: 200px; height: 280px; }
  .product-badge-1 { left: 0; }
  .product-badge-2 { right: 0; }
}

/* =============================================
   BRAND STRIP
   ============================================= */
.brand-strip {
  background: var(--dark);
  padding: 20px 0;
  overflow: hidden;
}
.brand-marquee {
  display: flex; align-items: center;
  animation: marquee 20s linear infinite;
  width: max-content;
  gap: 0;
}
.brand-item {
  padding: 0 48px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: rgba(250,247,242,0.25);
  white-space: nowrap;
  display: flex; align-items: center; gap: 48px;
  transition: color 0.3s;
}
.brand-item:hover { color: var(--gold); }
.brand-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); opacity: 0.4; }

/* =============================================
   CATEGORIES
   ============================================= */
#categories { background: var(--cream); }

.section-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 56px; flex-wrap: wrap; gap: 20px;
}
.section-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.section-eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--gold); }
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 700;
  color: var(--dark);
  line-height: 1.1;
}
.section-title em { font-style: italic; color: var(--brown); }
.view-all {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--dark);
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--dark);
  padding-bottom: 2px;
  transition: color 0.3s, border-color 0.3s;
}
.view-all:hover { color: var(--gold); border-color: var(--gold); }

.categories-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: 300px 300px;
  gap: 16px;
}
@media(max-width:768px){
  .categories-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
}

.cat-card {
  position: relative; overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
}
.cat-card:first-child { grid-row: 1 / 3; }
@media(max-width:768px){ .cat-card:first-child { grid-row: auto; } }

.cat-bg {
  width: 100%; height: 100%;
  transition: transform 0.6s ease;
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
}
.cat-card:hover .cat-bg { transform: scale(1.06); }

.cat-bg-1 { background: linear-gradient(135deg, #c4b09f, #a8907c); min-height: 300px; }
.cat-bg-2 { background: linear-gradient(135deg, #8b9e7a, #6d7e5e); }
.cat-bg-3 { background: linear-gradient(135deg, #9e8a7a, #7a6a60); }
.cat-bg-4 { background: linear-gradient(135deg, #c4622d, #a04d20); }
.cat-bg-5 { background: linear-gradient(135deg, #c9a84c, #a88030); }

.cat-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(26,20,16,0.7) 0%, transparent 60%);
}
.cat-info {
  position: absolute; bottom: 24px; left: 24px;
}
.cat-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--cream);
  display: block; margin-bottom: 4px;
}
.cat-count {
  font-size: 11px;
  color: rgba(250,247,242,0.65);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.cat-arrow {
  position: absolute; top: 20px; right: 20px;
  width: 36px; height: 36px;
  border: 1px solid rgba(250,247,242,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--cream);
  font-size: 12px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}
.cat-card:hover .cat-arrow { opacity: 1; transform: translateY(0); }

/* =============================================
   FEATURED PRODUCTS
   ============================================= */
#products { background: var(--warm); }

.products-tabs {
  display: flex; gap: 0; margin-bottom: 48px;
  border-bottom: 1px solid var(--beige);
}
.tab-btn {
  padding: 12px 24px;
  background: none; border: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color 0.3s;
  position: relative;
  cursor: pointer;
}
.tab-btn::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--dark); transform: scaleX(0);
  transition: transform 0.3s;
}
.tab-btn.active { color: var(--dark); }
.tab-btn.active::after { transform: scaleX(1); }
.tab-btn:hover { color: var(--dark); }

.products-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
@media(max-width:1024px){ .products-grid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px){ .products-grid{ grid-template-columns:1fr; } }

.product-card {
  background: var(--cream);
  position: relative;
  overflow: hidden;
  transition: var(--trans);
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(26,20,16,0.1); }

.product-img-wrap {
  position: relative; overflow: hidden;
  aspect-ratio: 3/4;
  background: var(--beige);
  display: flex; align-items: center; justify-content: center;
}
.product-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  color: rgba(139,111,94,0.2);
  transition: transform 0.6s ease;
}
.product-card:hover .product-img-placeholder { transform: scale(1.05); }

/* per-card bg colors */
.product-card:nth-child(1) .product-img-wrap { background: linear-gradient(135deg, #ddd0c4, #ccc0b0); }
.product-card:nth-child(2) .product-img-wrap { background: linear-gradient(135deg, #c8d4c0, #b8c4a8); }
.product-card:nth-child(3) .product-img-wrap { background: linear-gradient(135deg, #d4c0b8, #c4b0a8); }
.product-card:nth-child(4) .product-img-wrap { background: linear-gradient(135deg, #d4c890, #c4b870); }

.product-badge-tag {
  position: absolute; top: 16px; left: 16px;
  padding: 4px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.tag-new { background: var(--dark); color: var(--cream); }
.tag-sale { background: var(--rust); color: #fff; }
.tag-hot  { background: var(--gold); color: var(--dark); }

.product-actions-hover {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(26,20,16,0.9);
  display: flex; gap: 0;
  transform: translateY(100%);
  transition: transform 0.35s ease;
}
.product-card:hover .product-actions-hover { transform: translateY(0); }

.product-action-btn {
  flex: 1; padding: 14px 8px;
  background: none; border: none;
  border-right: 1px solid rgba(250,247,242,0.1);
  color: var(--cream);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: background 0.3s;
